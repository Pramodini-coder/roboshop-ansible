- name: Disable nginx default version
  ansible.builtin.shell: dnf module disable nginx -y

- name: enable nginx version 1.24
  ansible.builtin.shell: dnf module disable nginx -y



- name: install nginx
  ansible.builtin.dnf:
    name: nginx
    state: installed

- name: copy ngnix config
  ansible.builtin.copy:
    src: nginx.conf
    dest: /ect/nginx/nginx.conf



- name: remove ngnix default content
  ansible.builtin.file:
    path: /usr/share/nginx/html
    state: absent

- name: create nginx http directory
  ansible.builtin.file:
    path: /usr/share/ngnix/html/
    state: directory

- name: download nginx content
  ansible.builtin.unarchive:
    src: http://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
    dest: /usr/share/nginx/html
    remote_src: yes

- name: start nginx
  ansible.builtin.systemd_service:
    name: nginx
    state: restarted
    enabled: yes


